<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; line-height: 1.6; color: #333; }
        .header { background: #2563eb; color: #fff; padding: 60px 20px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.2em; opacity: 0.9; }
        .content { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: #f8fafc; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
        .card h2 { margin-bottom: 8px; }
        .footer { text-align: center; padding: 20px; color: #666; border-top: 1px solid #eee; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>欢迎来到我的网站</h1>
        <p>一个简单的页面示例</p>
    </div>
    <div class="content">
        <div class="card">
            <h2>关于我们</h2>
            <p>这是使用 GitHub Pages 部署的静态页面。</p>
        </div>
        <div class="card">
            <h2>功能特点</h2>
            <p>✅ 快速部署 · ✅ 免费托管 · ✅ 自定义域名</p>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 我的网站</p>
    </div>
</body>
</html>
